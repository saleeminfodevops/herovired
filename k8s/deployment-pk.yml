apiVersion: v1
kind: Namespace
metadata:
  name: nginx-deployment
  labels:
    app: nginx

spec:
  replicas: 2

    selector:
      matchLabels:
        app:  nginx

  template:
    metadata
      lables:
        app: nginx
        
    spec:
      containers:
        - name: nginx-container
          image:  
          ports:
          - containerPort: 80

    spec:

      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "500m"
          memory: "256Mi"

        